<rect x="0" y="0" width="680" height="484" fill="#FBFAF7"/>

<rect x="250" y="40" width="180" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="340" y="67" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">You — the modder</text>

<line x1="340" y1="84" x2="340" y2="110" stroke="#6b6a66" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<rect x="190" y="110" width="300" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="340" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">AI coding agent</text>
<text x="340" y="147" text-anchor="middle" font-size="12" font-weight="400" fill="#3C3489">Claude Code · Codex · reads, thinks, acts</text>

<line x1="340" y1="156" x2="340" y2="182" stroke="#6b6a66" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="182" width="600" height="30" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="340" y="201" text-anchor="middle" font-size="12" font-weight="400" fill="#2C2C2A">Safety hooks — confirm before edits · block direct ESP / BSA writes · auto-backup + audit</text>

<line x1="130" y1="212" x2="130" y2="232" stroke="#6b6a66" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="212" x2="340" y2="232" stroke="#6b6a66" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="550" y1="212" x2="550" y2="232" stroke="#6b6a66" stroke-width="1.5" marker-end="url(#arrow)"/>

