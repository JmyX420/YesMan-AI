<svg width="1020" viewBox="0 0 680 484" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
<title>YesMan AI communication pipeline</title>
<desc>You talk to an AI coding agent (Claude Code or Codex) in natural language. All of the agent's edit actions pass through safety hooks. From there the agent works through three channels: the AutoMod CLI driving xEditLib and external tools for offline plugin work; the MO2 MCP for live load-order and conflict data when Mod Organizer 2 is open; and the Live Link MCP through a Python relay and esp-less NVSE scripts to observe and command the running game. All three converge on your modded Fallout: New Vegas install.</desc>
